  <body>
    <div class="page">

      <main class="contact-page">

        <section class="contact-grid">

              <div>
                <p class="contact-card-label">Email Me</p>
                <a
                  href="mailto:janyawalia282@gmail.com"
                  class="contact-card-value"
                >
                  janyawalia282@gmail.com
                </a>
              </div>
            </article>

            <article class="contact-card">
              <div class="contact-card-icon contact-card-icon--pin">
                <span class="icon-pin" aria-hidden="true"></span>
              </div>
              <div>
                <p class="contact-card-label">Based In</p>
                <p class="contact-card-value">Waterloo, ON</p>
              </div>
            </article>
          </div>

          <article class="contact-links-card">
            <p class="contact-links-title">Links</p>
            <ul class="contact-links-list">
              <li>
                <a
                  href="https://www.linkedin.com/in/janya-walia/"
                  target="_blank"
                  rel="noreferrer"

                  <img
                    src="https://www.figma.com/api/mcp/asset/7e1c950c-c912-45c3-962d-908ad41445e5"
                    alt=""

              <li>
                <a

                  rel="noreferrer"

                    alt=""
                    class="contact-link-icon"
                  />
                  <span>Github</span>
                </a>
              </li>
              <li>
                <a
                  href="https://www.behance.net/janyawalia565"
                  target="_blank"
                  rel="noreferrer"
                  class="contact-link-row"
                >
                  <img
                    src="https://www.figma.com/api/mcp/asset/38d34f54-c9d7-4200-9575-e51f7ab0ca65"

                    class="contact-link-icon"

          <p class="site-footer-text">
            <span class="site-footer-prompt">&gt; janya walia 2026</span
