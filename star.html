<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Janya.Portfolio – Leave a Star</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=VT323&family=Space+Mono:wght@400;500;700&family=Anonymous+Pro:wght@400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="page">
      <header class="topbar" aria-label="Primary navigation">
        <div class="topbar-inner">
          <div class="topbar-logo">&gt;_ Janya.Portfolio</div>
          <nav class="topbar-nav">
            <a href="./index.html" class="topbar-link">Home</a>
            <a href="./about.html" class="topbar-link">About Me</a>
            <a href="./projects.html" class="topbar-link">Projects</a>
            <a href="./contact.html" class="topbar-link">Contact</a>
            <a href="./star.html" class="topbar-link topbar-link--star topbar-link--active">
              <span class="topbar-star-icon">✦</span>
              <span>Leave a Star</span>
            </a>
          </nav>
        </div>
        <div class="topbar-underline"></div>
      </header>

      <main class="star-page" aria-label="Leave a Star page">
        <section class="star-page-header">
          <p class="star-title">&gt; click anywhere to leave your star!</p>
          <p class="star-counter" id="star-page-counter">Loading stars...</p>
          <div class="star-color-picker" aria-label="Choose your star color">
            <span>Pick a color:</span>
            <button class="star-color-swatch star-color-swatch--white star-color-swatch--active" type="button" data-color="#ffffff" aria-label="White star"></button>
            <button class="star-color-swatch star-color-swatch--yellow" type="button" data-color="#ffe9a9" aria-label="Soft yellow star"></button>
            <button class="star-color-swatch star-color-swatch--blue" type="button" data-color="#9fdcff" aria-label="Light blue star"></button>
            <button class="star-color-swatch star-color-swatch--pink" type="button" data-color="#ffb3df" aria-label="Pink star"></button>
            <button class="star-color-swatch star-color-swatch--purple" type="button" data-color="#d3b5ff" aria-label="Soft purple star"></button>
          </div>
        </section>

        <section class="star-page-sky" id="star-page-sky" aria-label="Shared night sky">
          <div class="star-page-sky-inner" id="star-page-sky-inner" style="position:absolute;inset:0;">
            <div class="star-page-ambient star-page-ambient--layer1"></div>
            <div class="star-page-ambient star-page-ambient--layer2"></div>
          </div>
          <div class="star-scanlines" aria-hidden="true"></div>
        </section>

        <p class="star-note" id="star-page-note">
          Please leave one star — your star will stay here for others to see!
        </p>
      </main>

      <footer class="site-footer" aria-label="Footer">
        <div class="site-footer-inner">
          <p class="site-footer-text">
            <span class="site-footer-prompt">&gt; janya walia 2026</span
            ><span class="site-footer-cursor" aria-hidden="true"></span>
          </p>
          <p class="site-footer-text site-footer-resume">
            <a href="./janya-walia-resume.pdf" target="_blank" rel="noopener noreferrer">View resume</a>
          </p>
        </div>
      </footer>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
      import {
        getAuth,
        onAuthStateChanged,
        signInAnonymously
      } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
      import {
        getFirestore,
        collection,
        doc,
        setDoc,
        onSnapshot,
        serverTimestamp
      } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyD52inhCqXshSxhPwL4fXEIL8ARmMDhS8o",
        authDomain: "janya-portfolio.firebaseapp.com",
        projectId: "janya-portfolio",
        storageBucket: "janya-portfolio.firebasestorage.app",
        messagingSenderId: "641000228741",
        appId: "1:641000228741:web:0d74e79d863d3c018ba6ec"
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      const auth = getAuth(app);

      const skyOuter = document.getElementById("star-page-sky");
      const skyInner = document.getElementById("star-page-sky-inner");
      const counterEl = document.getElementById("star-page-counter");
      const noteEl = document.getElementById("star-page-note");
      const colorSwatches = Array.from(document.querySelectorAll(".star-color-swatch"));

      let selectedColor = "#ffffff";

      colorSwatches.forEach((swatch) => {
        swatch.addEventListener("click", (e) => {
          e.stopPropagation();
          colorSwatches.forEach((s) => s.classList.remove("star-color-swatch--active"));
          swatch.classList.add("star-color-swatch--active");
          selectedColor = swatch.dataset.color || "#ffffff";
        });
      });

      // One star per person: one document per auth uid.
      // Collection: starsByUser, doc id: uid
      const starsCol = collection(db, "starsByUser");

      function renderStar(star) {
        const dot = document.createElement("div");
        dot.className = "star-dot";
        dot.style.left = `${star.x * 100}%`;
        dot.style.top = `${star.y * 100}%`;
        dot.style.backgroundColor = star.color;
        skyInner.appendChild(dot);
      }

      onSnapshot(starsCol, (snapshot) => {
        skyInner.querySelectorAll(".star-dot").forEach((n) => n.remove());
        snapshot.forEach((doc) => {
          const data = doc.data();
          if (typeof data.x === "number" && typeof data.y === "number" && typeof data.color === "string") {
            renderStar(data);
          }
        });
        const count = snapshot.size;
        counterEl.textContent = count === 1
          ? "> ✦ 1 star left by visitors"
          : `> ✦ ${count} stars left by visitors`;
      }, (err) => {
        console.error("onSnapshot error:", err);
        counterEl.textContent = "> ✦ could not load stars";
      });

      // Auth bootstrap
      let uid = null;
      noteEl.textContent = "> connecting...";

      onAuthStateChanged(auth, (user) => {
        uid = user?.uid || null;
        if (uid) {
          noteEl.textContent = "> click to place (or move) your star ✦";
        }
      });

      // Ensure we are signed in (anonymous)
      signInAnonymously(auth).catch((err) => {
        console.error("Anonymous auth error:", err);
        noteEl.textContent = "> could not connect (auth).";
      });

      // Click listener on OUTER sky, coordinates calculated against INNER sky
      skyOuter.addEventListener("click", async (event) => {
        if (event.target.closest(".star-color-swatch")) return;

        if (!uid) {
          noteEl.textContent = "> connecting... try again in a second.";
          return;
        }

        const rect = skyInner.getBoundingClientRect();
        const x = (event.clientX - rect.left) / rect.width;
        const y = (event.clientY - rect.top) / rect.height;

        if (x < 0 || x > 1 || y < 0 || y > 1) return;

        try {
          await setDoc(
            doc(db, "starsByUser", uid),
            {
            x,
            y,
            color: selectedColor,
            timestamp: serverTimestamp()
            },
            { merge: true }
          );
          noteEl.textContent = "> saved ✦ (click again to move it)";
        } catch (err) {
          console.error("Error saving star:", err);
          noteEl.textContent = "> could not save your star, please try again.";
        }
      });
    </script>
  </body>
</html>
