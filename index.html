<!DOCTYPE html>
<html lang="en">
  <head>

    <link rel="stylesheet" href="./styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <body>
    <div id="root"></div>

    <script type="text/babel">

      const imgGitHub =
        "https://www.figma.com/api/mcp/asset/7474ca27-4bc0-4818-b2fd-2f9de5585f4c";

        "https://www.figma.com/api/mcp/asset/7dc54f66-6f88-46a7-bd88-b271f03e8dbe";

      function AboutPage() {
        return (
          <main className="about-page">
            <section className="about-hero" aria-label="About header">
              <p className="projects-kicker about-kicker">ABOUT_ME</p>
            </section>

            <section className="about-top" aria-label="About overview">
              <div className="about-top-grid">
                <div className="about-photo-card" aria-label="Portrait">

                <div className="about-terminal-card" aria-label="Bio terminal">

                    <span className="about-terminal-cmd">cat bio.txt</span>
                  </div>
                  <p className="about-terminal-paragraph">

                    first. I enjoy building complete systems, but I care a lot
                    about how they look and feel to the user and brand, as well
                    as how they function.
                  </p>
                  <p className="about-terminal-paragraph">
                    With a background in computer science and a love for
                    building systems, I enjoy working where structure meets
                    creativity, clean code and interfaces, thoughtful motion,
                    and cohesive design.
                  </p>
                  <div className="about-terminal-line about-terminal-line--cmd">
                    <span className="about-terminal-prompt">+</span>
                    <span className="about-terminal-cmd">echo $CURRENT_STATUS</span>
                  </div>
                  <p className="about-terminal-status">
                    “Designing digital solutions for the future.”
                  </p>
                </div>
              </div>

              <div className="about-stats" aria-label="Quick stats">
                <div className="about-stat">
                  <p className="about-stat-label">EXP</p>
                  <p className="about-stat-value">3_YEARS</p>
                </div>
                <div className="about-stat">
                  <p className="about-stat-label">ROLE</p>
                  <p className="about-stat-value about-stat-value--pink">
                    FULLSTACK_ENG
                  </p>
                </div>
                <div className="about-stat">
                  <p className="about-stat-label">Qualifications</p>
                  <p className="about-stat-value about-stat-value--green">
                    Honours B.S. Computer Science
                  </p>
                  <p className="about-stat-value about-stat-value--green">
                    User Experience Design Minor
                  </p>
                </div>
                <div className="about-stat">
                  <p className="about-stat-label">STATUS</p>
                  <p className="about-stat-value about-stat-value--blue">
                    OPEN_TO_WORK
                  </p>
                </div>
              </div>
            </section>

            <section className="about-logs" aria-label="System logs">
              <h1 className="about-logs-title">
                <span className="about-logs-prompt">&gt;_</span> SYSTEM_LOGS
              </h1>

              <ol className="about-timeline" aria-label="Timeline">
                <li className="about-timeline-item">
                  <div className="about-timeline-marker" aria-hidden="true"></div>
                  <div className="about-timeline-year">2025</div>
                  <div className="about-timeline-content">

                      Provided academic support for coding, math and english to
                      kids.

                </li>

                <li className="about-timeline-item">
                  <div className="about-timeline-marker" aria-hidden="true"></div>
                  <div className="about-timeline-year">2025-2026</div>
                  <div className="about-timeline-content">
                    <p className="about-timeline-heading">
                      Wilfrid Laurier University - Academic Tutor

                </li>

                <li className="about-timeline-item">

                  <div className="about-timeline-content">
                    <p className="about-timeline-heading">
                      Laurier STEM Publishing Society - VP of Web Development
                    </p>
                    <p className="about-timeline-body">
                      Led the design, development and maintenance of the
                      club&apos;s website.
                    </p>
                  </div>
                </li>

                <li className="about-timeline-item">
                  <div className="about-timeline-marker" aria-hidden="true"></div>
                  <div className="about-timeline-year">2027</div>
                  <div className="about-timeline-content">
                    <p className="about-timeline-heading">

                      web technologies.

      }

      function ContactPage() {
        return (
          <main className="contact-page">
            <section className="contact-hero" aria-labelledby="contact-heading">
              <h1 id="contact-heading" className="contact-title">
                GET_IN_TOUCH
              </h1>
              <p className="contact-subtitle">
                Feel free to get in touch and also check out my portfolio&apos;s
                on GITHUB and Behance!
              </p>
            </section>

            <section className="contact-grid">
              <div className="contact-column">
                <article className="contact-card">
                  <div className="contact-card-icon contact-card-icon--mail">
                    <span className="icon-mail" aria-hidden="true" />
                  </div>
                  <div>
                    <p className="contact-card-label">Email Me</p>
                    <a
                      href="mailto:janyawalia282@gmail.com"
                      className="contact-card-value"
                    >
                      janyawalia282@gmail.com
                    </a>
                  </div>
                </article>

                <article className="contact-card">
                  <div className="contact-card-icon contact-card-icon--pin">
                    <span className="icon-pin" aria-hidden="true" />
                  </div>
                  <div>
                    <p className="contact-card-label">Based In</p>
                    <p className="contact-card-value">Waterloo, ON</p>
                  </div>
                </article>
              </div>

              <article className="contact-links-card">
                <p className="contact-links-title">Links</p>
                <ul className="contact-links-list">
                  <li>
                    <a
                      href="https://www.linkedin.com"
                      target="_blank"
                      rel="noreferrer"
                      className="contact-link-row"
                    >
                      <img
                        src={imgLinkedin}
                        alt=""
                        className="contact-link-icon"
                      />
                      <span>LinkedIn</span>
                    </a>
                  </li>
                  <li>
                    <a
                      href="https://github.com"
                      target="_blank"
                      rel="noreferrer"
                      className="contact-link-row"
                    >
                      <img
                        src={imgGitHub}
                        alt=""
                        className="contact-link-icon"
                      />
                      <span>Github</span>
                    </a>
                  </li>
                  <li>
                    <a
                      href="https://www.behance.net"
                      target="_blank"
                      rel="noreferrer"
                      className="contact-link-row"
                    >
                      <img
                        src={imgBehance}
                        alt=""
                        className="contact-link-icon"
                      />
                      <span>Behance</span>
                    </a>
                  </li>
                </ul>
              </article>
            </section>
          </main>
        );
      }

      function HomePage() {
        return (
          <main className="home-page">
            <section className="home-hero">
              <p className="home-eyebrow">{">_ Home"}</p>
              <h1 className="home-title">
                Digital designer &amp;{" "}
                <span className="home-title-em">frontend developer</span>
              </h1>
              <p className="home-body">
                I design and build playful, precise interfaces with a focus on
                motion, systems, and small details that feel just right.

            </section>

            <section className="home-meta-row">
              <article className="home-card">
                <p className="home-card-label">Email Me</p>

              </article>

              <article className="home-card">
                <p className="home-card-label">Based In</p>
                <p className="home-card-value">Waterloo, ON</p>
              </article>

              <article className="home-card">
                <p className="home-card-label">Currently</p>
                <p className="home-card-value">Exploring portfolio UX &amp; UI</p>
              </article>
            </section>
          </main>
        );
      }

      function ProjectsPage() {
        return (
          <main className="projects-page">
            <section className="projects-hero">
              <p className="projects-kicker">PROJECTS</p>
            </section>

            <section className="projects-grid">
              <article className="project-card">
                <img src={imgLsps} alt="" className="project-image" />
                <div className="project-content">
                  <h2 className="project-title">LSPS Website</h2>
                  <p className="project-body">
                    Developed a custom website for my club, Laurier STEM
                    Publishing Society to host and distribute student-led STEM
                    content.
                  </p>
                  <div className="project-tags">
                    <span className="project-tag">Figma</span>
                    <span className="project-tag">HTML/CSS</span>
                    <span className="project-tag">Javascript</span>
                  </div>
                </div>
              </article>

              <article className="project-card">
                <img src={imgSpaceInvaders} alt="" className="project-image" />
                <div className="project-content">
                  <h2 className="project-title">Space Invaders</h2>
                  <p className="project-body">
                    Recreation of space invaders using custom drawn pixels and
                    animations in Java.
                  </p>
                  <div className="project-tags">
                    <span className="project-tag">Processing</span>
                    <span className="project-tag">Java</span>
                    <span className="project-tag">Pixel Art</span>
                  </div>
                </div>
              </article>

              <article className="project-card">
                <img src={imgBulletin} alt="" className="project-image" />
                <div className="project-content">
                  <h2 className="project-title">Bulletin Board Server</h2>
                  <p className="project-body">
                    Client–server application using Java stream sockets.
                    Simulates a networked bulletin board that supports multiple
                    concurrent clients on a centralized server.
                  </p>
                  <div className="project-tags">
                    <span className="project-tag">Visual Studio</span>
                    <span className="project-tag">Java</span>
                  </div>
                </div>
              </article>

              <article className="project-card">
                <div className="project-image project-image--ux" />
                <div className="project-content">
                  <h2 className="project-title">UX designs</h2>
                  <p className="project-body">
                    A collection of UX explorations, wireflows, and prototypes.
                  </p>
                  <div className="project-tags">
                    <span className="project-tag">Figma</span>
                    <span className="project-tag">Docs</span>
                    <span className="project-tag">Axure</span>

                </div>

              <article className="project-card">
                <img src={imgModeling} alt="" className="project-image" />

                  <p className="project-body">
                    Designed and implemented a car rental software system by

                    <span className="project-tag">SQL</span>

        );

      function App() {
        const [page, setPage] = useState("home");

        return (
          <div className="page">
            <header className="topbar">
              <div className="topbar-inner">
                <div className="topbar-logo">{">_ Janya.Portfolio"}</div>
                <nav className="topbar-nav">
                  <button
                    className={
                      "topbar-link" + (page === "home" ? " topbar-link--active" : "")
                    }
                    onClick={() => setPage("home")}
                  >
                    Home
                  </button>
                  <button
                    className={
                      "topbar-link" + (page === "about" ? " topbar-link--active" : "")
                    }
                    type="button"
                    onClick={() => setPage("about")}
                  >
                    About Me
                  </button>
                  <button
                    className={
                      "topbar-link" +
                      (page === "projects" ? " topbar-link--active" : "")
                    }
                    type="button"
                    onClick={() => setPage("projects")}
                  >
                    Projects
                  </button>
                  <button
                    className={
                      "topbar-link" +
                      (page === "contact" ? " topbar-link--active" : "")
                    }
                    onClick={() => setPage("contact")}
                  >
                    Contact
                  </button>
                </nav>
              </div>
              <div className="topbar-underline" />
            </header>

            {page === "home" && <HomePage />}
            {page === "about" && <AboutPage />}
            {page === "projects" && <ProjectsPage />}
            {page === "contact" && <ContactPage />}
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
